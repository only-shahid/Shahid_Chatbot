<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shahid Communication & GAMCA Solution</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00b386;
    --green-dark: #008f6b;
    --green-light: #e6fff8;
    --gold: #f5a623;
    --dark: #0d1f1a;
    --dark2: #152b24;
    --text: #1a2e28;
    --border: #c8e6de;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0d1f1a 0%, #1a3d30 50%, #0d2a20 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  .header {
    width: 100%;
    max-width: 480px;
    background: linear-gradient(135deg, var(--dark), var(--dark2));
    border-radius: 20px 20px 0 0;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid #2a4a3e;
    border-bottom: none;
  }

  .logo-circle {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    box-shadow: 0 4px 15px rgba(0,179,134,0.4);
  }

  .header-text h1 { font-size: 15px; font-weight: 700; color: white; }
  .header-text p { font-size: 11px; color: var(--green); font-weight: 500; margin-top: 2px; }

  .status-dot {
    margin-left: auto; display: flex; align-items: center;
    gap: 6px; font-size: 11px; color: #a0c4ba;
  }

  .dot {
    width: 8px; height: 8px; background: #4ade80;
    border-radius: 50%; animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.6; transform:scale(0.8); }
  }

  .chat-wrap {
    width: 100%; max-width: 480px;
    background: #f5faf8;
    display: flex; flex-direction: column;
    border: 1px solid #c8e6de;
    border-top: none; border-bottom: none;
  }

  .messages {
    overflow-y: auto;
    padding: 16px;
    display: flex; flex-direction: column;
    gap: 12px;
    min-height: 400px;
    max-height: 420px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .quick-replies {
    padding: 10px 14px;
    display: flex; gap: 7px; flex-wrap: wrap;
    border-top: 1px solid var(--border);
    background: white;
  }

  .quick-btn {
    background: var(--green-light);
    border: 1.5px solid var(--green);
    color: var(--green-dark);
    padding: 6px 11px;
    border-radius: 20px;
    font-size: 11px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Poppins', sans-serif;
    white-space: nowrap;
  }

  .quick-btn:hover, .quick-btn:active {
    background: var(--green); color: white;
    transform: translateY(-1px);
  }

  .input-area {
    padding: 12px 14px;
    background: white;
    display: flex; gap: 10px; align-items: center;
    border-top: 1px solid var(--border);
  }

  .input-area input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 25px;
    padding: 10px 16px;
    font-size: 13px;
    font-family: 'Poppins', sans-serif;
    outline: none;
    color: var(--text);
    background: #f8fefe;
    transition: border-color 0.2s;
  }

  .input-area input:focus { border-color: var(--green); background: white; }

  .send-btn {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    border: none; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(0,179,134,0.35);
    transition: all 0.2s;
  }

  .send-btn:hover { transform: scale(1.08); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  .footer {
    width: 100%; max-width: 480px;
    background: var(--dark);
    border-radius: 0 0 20px 20px;
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border: 1px solid #2a4a3e; border-top: none;
  }

  .footer-info { font-size: 11px; color: #6a9a8e; }

  .wa-btn {
    background: #25d366; color: white;
    border: none; border-radius: 20px;
    padding: 7px 14px; font-size: 11.5px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 5px;
    text-decoration: none; transition: all 0.2s;
    font-family: 'Poppins', sans-serif;
  }

  .wa-btn:hover { background: #20bc5a; }

  .msg { display: flex; gap: 8px; animation: fadeUp 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  .avatar {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }

  .avatar.bot { background: linear-gradient(135deg, var(--green), var(--green-dark)); }
  .avatar.user-av { background: linear-gradient(135deg, #667eea, #764ba2); }

  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13px; line-height: 1.6;
    color: var(--text);
  }

  .bubble.bot {
    background: white;
    border-radius: 4px 16px 16px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border: 1px solid #e0f0ea;
  }

  .bubble.user {
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: white;
    border-radius: 16px 4px 16px 16px;
    box-shadow: 0 2px 10px rgba(0,179,134,0.3);
  }

  .bubble .price { color: var(--gold); font-weight: 700; }
  .bubble.user .price { color: #ffe082; }
  .bubble strong { font-weight: 600; }
  .bubble .row { margin: 3px 0; }

  @media (max-width: 520px) {
    body { justify-content: flex-start; }
    .header, .chat-wrap, .footer { border-radius: 0; max-width: 100%; }
    .messages { max-height: calc(100vh - 270px); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-circle">\ud83d\udda8\ufe0f</div>
  <div class="header-text">
    <h1>Shahid Communication</h1>
    <p>& GAMCA Solution</p>
  </div>
  <div class="status-dot">
    <div class="dot"></div>
    <span>Online</span>
  </div>
</div>

<div class="chat-wrap">
  <div class="messages" id="messages"></div>

  <div class="quick-replies">
    <button class="quick-btn" onclick="sendQuick('photocopy')">\ud83d\udcc4 Photocopy</button>
    <button class="quick-btn" onclick="sendQuick('print')">\ud83d\udda8\ufe0f Print</button>
    <button class="quick-btn" onclick="sendQuick('gamca')">\ud83c\udfe5 GAMCA</button>
    <button class="quick-btn" onclick="sendQuick('nadra')">\ud83e\udeaa NADRA</button>
    <button class="quick-btn" onclick="sendQuick('cv')">\ud83d\udcdd CV/Resume</button>
    <button class="quick-btn" onclick="sendQuick('timing')">\u23f0 Timing</button>
    <button class="quick-btn" onclick="sendQuick('coating')">\ud83d\udee1\ufe0f Coating</button>
    <button class="quick-btn" onclick="sendQuick('typing')">\u2328\ufe0f Typing</button>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Apna sawal likhein..." onkeypress="handleKey(event)" />
    <button class="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<div class="footer">
  <div class="footer-info">\u23f0 7:00 AM \u2013 5:00 PM</div>
  <a class="wa-btn" href="https://wa.me/923440524519" target="_blank">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    WhatsApp
  </a>
</div>

<script>
const responses = {
  photocopy: `<strong>\ud83d\udcc4 Photocopy Prices:</strong><br>
<div class="row">\u2022 Single Side: <span class="price">Rs. 10</span></div>
<div class="row">\u2022 Double Side: <span class="price">Rs. 20</span></div>
<br>Koi aur cheez chahiye? \ud83d\ude0a`,

  print: `<strong>\ud83d\udda8\ufe0f Print Prices:</strong><br>
<div class="row">\u2022 Black & White: <span class="price">Rs. 20</span></div>
<div class="row">\u2022 Color: <span class="price">Rs. 50</span></div>
<br>Koi aur sawal? \ud83d\ude0a`,

  gamca: `<strong>\ud83c\udfe5 GAMCA / Wafid Gulf Medical Appointment</strong><br>
<div class="row">\u2022 Fee: <span class="price">Rs. 4,000</span></div>
<br><strong>Documents chahiye:</strong><br>
<div class="row">\u2022 Original Passport</div>
<div class="row">\u2022 CNIC (purana/naya)</div>
<br>Appointment ke liye WhatsApp karein:<br><strong>03440524519</strong> \ud83d\udcf1`,

  navtcc: `<strong>\ud83c\udf93 NAVTCC Trade Appointment</strong><br>
<div class="row">\u2022 Fee: <span class="price">Rs. 18,000</span></div>
<br>Booking ke liye WhatsApp karein: <strong>03440524519</strong> \ud83d\udcf1`,

  nadra: `<strong>\ud83e\udeaa NADRA ID Card Services:</strong><br>
<div class="row">\u2022 ID Card Renewal: <span class="price">Rs. 1,500</span></div>
<div class="row">\u2022 ID Card Correction: <span class="price">Rs. 1,500</span></div>
<div class="row">\u2022 Updating (NP): <span class="price">Rs. 500</span></div>
<div class="row">\u2022 Updating (P): <span class="price">Rs. 2,000</span></div>
<div class="row">\u2022 ID Cancellation: <span class="price">Rs. 500</span></div>
<div class="row">\u2022 FRC: <span class="price">Rs. 2,000</span></div>
<br>Home visit bhi available hai (fuel charges extra) \ud83c\udfe0`,

  frc: `<strong>\ud83d\udccb FRC (Family Registration Certificate)</strong><br>
<div class="row">\u2022 Fee: <span class="price">Rs. 2,000</span></div>
<br>Onsite aur home visit dono available hain.<br>Contact: <strong>03440524519</strong> \ud83d\udcf1`,

  cv: `<strong>\ud83d\udcdd CV / Resume:</strong><br>
<div class="row">\u2022 Normal/Simple: <span class="price">Rs. 100</span></div>
<div class="row">\u2022 Professional (with picture): <span class="price">Rs. 200</span></div>
<br>Urdu/English dono mein available! \u2705`,

  typing: `<strong>\u2328\ufe0f Typing Service:</strong><br>
<div class="row">\u2022 Urdu/English per page: <span class="price">Rs. 150</span></div>
<br>Fast aur accurate typing available hai! \u2705`,

  photo: `<strong>\ud83d\udcf8 Passport Size Photographs:</strong><br>
<div class="row">\u2022 8 photos (1 sheet): <span class="price">Rs. 200</span></div>
<br>Urgent service bhi available hai! \u2705`,

  coating: `<strong>\ud83d\udee1\ufe0f Plastic Coating Prices:</strong><br>
<div class="row">\u2022 Soft Coating A4: <span class="price">Rs. 50</span></div>
<div class="row">\u2022 Soft Coating Legal: <span class="price">Rs. 70</span></div>
<div class="row">\u2022 Hard Coating A4: <span class="price">Rs. 100</span></div>
<div class="row">\u2022 Hard Coating ID: <span class="price">Rs. 50</span></div>`,

  stamp: `<strong>\ud83d\udcdc Stamp Paper & Legal Documents:</strong><br>
<div class="row">\u2022 Stamp Paper: Value par depend karta hai</div>
<div class="row">\u2022 E-Stamping Challan Fee: <span class="price">Rs. 100</span></div>
<div class="row">\u2022 Legal Documentation (Rent/Sell/Half Nama): Available</div>
<div class="row">\u2022 Notary Public Legal per page: <span class="price">Rs. 50</span></div>
<div class="row">\u2022 Notary Public Normal per page: <span class="price">Rs. 10</span></div>
<div class="row">\u2022 Oath Commissioner per page: <span class="price">Rs. 200</span></div>
<br>Contact: <strong>03440524519</strong> \ud83d\udcf1`,

  id_dup: `<strong>\ud83e\udeaa Duplicate ID Card:</strong><br>
<div class="row">\u2022 Fee: <span class="price">Rs. 100</span></div>`,

  timing: `<strong>\u23f0 Shop Timing & Info:</strong><br>
<div class="row">\u2022 Time: <strong>7:00 AM \u2013 5:00 PM</strong></div>
<div class="row">\u2022 Location: Shahrah-e-Faisal, Karachi</div>
<div class="row">\u2022 WhatsApp: <strong>03440524519</strong></div>
<br>Mil ke ayen ya WhatsApp karein, khushi se help karenge! \ud83d\ude0a`,

  salam: `Wa Alaikum Assalam! \ud83d\ude0a<br><br>
Kaise help kar sakta hoon aapki?<br>
Services, prices, ya appointment ke liye batayein!`,

  thanks: `Shukriya! \ud83d\ude4f Aapka din acha guzre.<br><br>
Koi aur madad chahiye to batayein! \ud83d\ude0a`,

  default: `Samajh nahi aaya, lekin main help karna chahta hoon! \ud83d\ude0a<br><br>
Neeche buttons se select karein ya WhatsApp karein:<br>
<strong>03440524519</strong> \ud83d\udcf1`
};

function getResponse(msg) {
  const m = msg.toLowerCase();

  if (m.match(/salam|assalam|hello|hi|helo|\u0627\u0644\u0633\u0644\u0627\u0645/)) return responses.salam;
  if (m.match(/shukriya|thanks|thank|\u0634\u0643\u0631\u0627|\u062c\u0632\u0627\u0643/)) return responses.thanks;
  if (m.match(/photocopy|copy|copies|\u0641\u0648\u0679\u0648 \u06a9\u0627\u067e\u06cc/)) return responses.photocopy;
  if (m.match(/print|printing|\u067e\u0631\u0646\u0679/)) return responses.print;
  if (m.match(/gamca|wafid|gulf|medical|meical|appointment|gulf appoint/i)) return responses.gamca;
  if (m.match(/navtcc|navttc|trade/)) return responses.navtcc;
  if (m.match(/nadra|id card|cnic|renewal|renew|update|cancel|correct|frc|family reg/)) return responses.nadra;
  if (m.match(/frc|family reg/)) return responses.frc;
  if (m.match(/cv|resume|bio data|biodata/)) return responses.cv;
  if (m.match(/typing|type|typed/)) return responses.typing;
  if (m.match(/photo|passport size|pic|picture/)) return responses.photo;
  if (m.match(/coating|lamination|plastic/)) return responses.coating;
  if (m.match(/stamp|legal|notary|oath|agreement|rent|sell|half nama|translation|estamping|e-stamp/)) return responses.stamp;
  if (m.match(/duplicate|dup id/)) return responses.id_dup;
  if (m.match(/timing|time|waqt|schedule|open|close|location|address|kahan|office|shop/)) return responses.
