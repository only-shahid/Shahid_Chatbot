<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shahid Communication</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Poppins',sans-serif;
  background:#0d1f1a;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.header {
  width:100%; max-width:480px;
  background:#0d1f1a;
  padding:14px 18px;
  display:flex; align-items:center; gap:12px;
  border-bottom:2px solid #00b386;
}
.logo {
  width:44px; height:44px;
  background:#00b386;
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; font-weight:700; color:#fff;
  flex-shrink:0;
}
.htext h1 { font-size:14px; font-weight:700; color:#fff; }
.htext p { font-size:11px; color:#00b386; margin-top:1px; }
.online {
  margin-left:auto;
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:#a0c4ba;
}
.dot {
  width:8px; height:8px;
  background:#4ade80; border-radius:50%;
  animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

.messages {
  width:100%; max-width:480px;
  overflow-y:auto;
  padding:16px;
  display:flex; flex-direction:column; gap:10px;
  background:#f0faf7;
  min-height:380px;
  max-height:400px;
}
@media(max-width:520px){
  .messages { max-height:calc(100vh - 260px); }
}
.msg { display:flex; gap:8px; animation:up 0.3s ease; }
.msg.user { flex-direction:row-reverse; }
@keyframes up { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

.av {
  width:30px; height:30px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:700; color:#fff;
  flex-shrink:0; margin-top:2px;
}
.av.bot { background:#00b386; }
.av.usr { background:#764ba2; }

.bubble {
  max-width:80%;
  padding:9px 13px;
  border-radius:14px;
  font-size:12.5px; line-height:1.65;
}
.bubble.bot {
  background:#fff;
  border-radius:3px 14px 14px 14px;
  box-shadow:0 1px 6px rgba(0,0,0,0.08);
  color:#1a2e28;
  border:1px solid #d0ece5;
}
.bubble.usr {
  background:#00b386;
  border-radius:14px 3px 14px 14px;
  color:#fff;
}
.bubble .pr { color:#f5a623; font-weight:700; }
.bubble .row { margin:2px 0; }
.bubble strong { font-weight:600; }

.qr {
  width:100%; max-width:480px;
  padding:10px 14px;
  display:flex; flex-wrap:wrap; gap:7px;
  background:#fff;
  border-top:1px solid #d0ece5;
}
.qb {
  background:#e6fff8;
  border:1.5px solid #00b386;
  color:#008f6b;
  padding:5px 11px;
  border-radius:20px;
  font-size:11px; font-weight:600;
  cursor:pointer;
  font-family:'Poppins',sans-serif;
  transition:all 0.2s;
}
.qb:hover,.qb:active { background:#00b386; color:#fff; }

.inp {
  width:100%; max-width:480px;
  padding:10px 14px;
  display:flex; gap:8px; align-items:center;
  background:#fff;
  border-top:1px solid #d0ece5;
}
.inp input {
  flex:1; border:1.5px solid #c8e6de;
  border-radius:22px; padding:9px 14px;
  font-size:13px; font-family:'Poppins',sans-serif;
  outline:none; color:#1a2e28; background:#f8fefe;
}
.inp input:focus { border-color:#00b386; }
.sbtn {
  width:40px; height:40px;
  background:#00b386; border:none; border-radius:50%;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.sbtn svg { width:17px; height:17px; fill:#fff; }

.foot {
  width:100%; max-width:480px;
  background:#0d1f1a;
  padding:11px 18px;
  display:flex; align-items:center; justify-content:space-between;
}
.foot span { font-size:11px; color:#6a9a8e; }
.wabtn {
  background:#25d366; color:#fff;
  border:none; border-radius:18px;
  padding:7px 13px; font-size:11px; font-weight:600;
  cursor:pointer; text-decoration:none;
  font-family:'Poppins',sans-serif;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">SC</div>
  <div class="htext">
    <h1>Shahid Communication</h1>
    <p>&amp; GAMCA Solution</p>
  </div>
  <div class="online">
    <div class="dot"></div>
    Online
  </div>
</div>

<div class="messages" id="msgs"></div>

<div class="qr">
  <button class="qb" onclick="ask('photocopy')">Photocopy</button>
  <button class="qb" onclick="ask('print')">Print</button>
  <button class="qb" onclick="ask('gamca')">GAMCA Medical</button>
  <button class="qb" onclick="ask('nadra')">NADRA</button>
  <button class="qb" onclick="ask('cv')">CV / Resume</button>
  <button class="qb" onclick="ask('timing')">Timing &amp; Location</button>
  <button class="qb" onclick="ask('coating')">Plastic Coating</button>
  <button class="qb" onclick="ask('typing')">Typing</button>
  <button class="qb" onclick="ask('photo')">Passport Photo</button>
  <button class="qb" onclick="ask('stamp')">Stamp / Legal</button>
  <button class="qb" onclick="ask('rates')">All Rates</button>
</div>

<div class="inp">
  <input type="text" id="txt" placeholder="Apna sawal likhein..." onkeypress="kp(event)"/>
  <button class="sbtn" onclick="send()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<div class="foot">
  <span>7:00 AM - 5:00 PM</span>
  <a class="wabtn" href="https://wa.me/923440524519" target="_blank">WhatsApp</a>
</div>

<script>
var R = {
  photocopy: '<strong>Photocopy Prices:</strong><br><div class="row">Single Side: <span class="pr">Rs. 10</span></div><div class="row">Double Side: <span class="pr">Rs. 20</span></div>',
  print: '<strong>Print Prices:</strong><br><div class="row">Black &amp; White: <span class="pr">Rs. 20</span></div><div class="row">Color: <span class="pr">Rs. 50</span></div>',
  gamca: '<strong>GAMCA / Wafid Gulf Medical:</strong><br><div class="row">Fee: <span class="pr">Rs. 4,000</span></div><br><strong>Documents needed:</strong><br><div class="row">- Original Passport</div><div class="row">- CNIC (old/new)</div><br>Appointment ke liye:<br><strong>WhatsApp: 03440524519</strong>',
  navtcc: '<strong>NAVTCC Trade Appointment:</strong><br>Fee: <span class="pr">Rs. 18,000</span><br><br>Booking: <strong>03440524519</strong>',
  nadra: '<strong>NADRA ID Card Services:</strong><br><div class="row">ID Renewal: <span class="pr">Rs. 1,500</span></div><div class="row">ID Correction: <span class="pr">Rs. 1,500</span></div><div class="row">Updating NP: <span class="pr">Rs. 500</span></div><div class="row">Updating P: <span class="pr">Rs. 2,000</span></div><div class="row">Cancellation: <span class="pr">Rs. 500</span></div><div class="row">FRC: <span class="pr">Rs. 2,000</span></div><br>Home visit bhi available hai.',
  cv: '<strong>CV / Resume:</strong><br><div class="row">Normal/Simple: <span class="pr">Rs. 100</span></div><div class="row">Professional with photo: <span class="pr">Rs. 200</span></div><br>Urdu aur English dono available!',
  typing: '<strong>Typing Service:</strong><br>Urdu/English per page: <span class="pr">Rs. 150</span>',
  photo: '<strong>Passport Size Photos:</strong><br>8 photos (1 sheet): <span class="pr">Rs. 200</span><br>Urgent service available!',
  coating: '<strong>Plastic Coating:</strong><br><div class="row">Soft Coating A4: <span class="pr">Rs. 50</span></div><div class="row">Soft Coating Legal: <span class="pr">Rs. 70</span></div><div class="row">Hard Coating A4: <span class="pr">Rs. 100</span></div><div class="row">Hard Coating ID: <span class="pr">Rs. 50</span></div>',
  stamp: '<strong>Stamp &amp; Legal Documents:</strong><br><div class="row">Stamp Paper: Value par depend</div><div class="row">E-Stamping Fee: <span class="pr">Rs. 100</span></div><div class="row">Legal Docs (Rent/Sell/Half Nama): Available</div><div class="row">Notary Legal per page: <span class="pr">Rs. 50</span></div><div class="row">Notary Normal per page: <span class="pr">Rs. 10</span></div><div class="row">Oath Commissioner per page: <span class="pr">Rs. 200</span></div>',
  timing: '<strong>Shop Info:</strong><br><div class="row">Time: 7:00 AM to 5:00 PM</div><div class="row">Location: Shahrah-e-Faisal, Karachi</div><div class="row">WhatsApp: 03440524519</div>',
  rates: '<strong>All Rates:</strong><br><div class="row">Photocopy Single: <span class="pr">Rs. 10</span></div><div class="row">Photocopy Double: <span class="pr">Rs. 20</span></div><div class="row">Print Black: <span class="pr">Rs. 20</span></div><div class="row">Print Color: <span class="pr">Rs. 50</span></div><div class="row">Passport Photos (8): <span class="pr">Rs. 200</span></div><div class="row">Typing per page: <span class="pr">Rs. 150</span></div><div class="row">CV Simple: <span class="pr">Rs. 100</span></div><div class="row">CV Professional: <span class="pr">Rs. 200</span></div><div class="row">GAMCA Appointment: <span class="pr">Rs. 4,000</span></div><div class="row">NADRA Renewal: <span class="pr">Rs. 1,500</span></div><div class="row">FRC: <span class="pr">Rs. 2,000</span></div>',
  salam: 'Wa Alaikum Assalam! Kaise help kar sakta hoon?<br>Neeche buttons dabayein ya sawal likhein.',
  thanks: 'Shukriya! Aapka din acha guzre. Koi aur madad chahiye to batayein.',
  def: 'Samajh nahi aaya. Neeche buttons dabayein ya WhatsApp karein: <strong>03440524519</strong>'
};

function getReply(m) {
  m = m.toLowerCase();
  if (/salam|hello|hi$|helo|assalam/.test(m)) return R.salam;
  if (/shukriya|thanks|thank/.test(m)) return R.thanks;
  if (/photocopy|copy/.test(m)) return R.photocopy;
  if (/print/.test(m)) return R.print;
  if (/gamca|wafid|gulf|medical/.test(m)) return R.gamca;
  if (/navtcc|navttc|trade/.test(m)) return R.navtcc;
  if (/nadra|id card|cnic|renewal|renew|frc|family|correction|cancel|update/.test(m)) return R.nadra;
  if (/cv|resume|biodata/.test(m)) return R.cv;
  if (/typing|type/.test(m)) return R.typing;
  if (/photo|passport size/.test(m)) return R.photo;
  if (/coating|lamination|plastic/.test(m)) return R.coating;
  if (/stamp|legal|notary|oath|agreement|rent|sell|translation/.test(m)) return R.stamp;
  if (/timing|time|waqt|open|close|location|address|kahan|shop/.test(m)) return R.timing;
  if (/rate|price|cost|kitna|charges|fee|amount/.test(m)) return R.rates;
  return R.def;
}

function addMsg(html, isUser) {
  var msgs = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg' + (isUser ? ' user' : '');
  var av = document.createElement('div');
  av.className = 'av ' + (isUser ? 'usr' : 'bot');
  av.textContent = isUser ? 'U' : 'SC';
  var b = document.createElement('div');
  b.className = 'bubble ' + (isUser ? 'usr' : 'bot');
  b.innerHTML = html;
  d.appendChild(av);
  d.appendChild(b);
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function ask(key) {
  var labels = {
    photocopy:'Photocopy prices?', print:'Print prices?',
    gamca:'GAMCA Medical Appointment?', nadra:'NADRA ID Card services?',
    cv:'CV/Resume banwana hai', timing:'Timing & location?',
    coating:'Plastic coating prices?', typing:'Typing service?',
    photo:'Passport size photo?', stamp:'Stamp & legal docs?', rates:'All rates?'
  };
  addMsg(labels[key] || key, true);
  setTimeout(function(){ addMsg(R[key] || R.def, false); }, 350);
}

function send() {
  var t = document.getElementById('txt').value.trim();
  if (!t) return;
  document.getElementById('txt').value = '';
  addMsg(t, true);
  setTimeout(function(){ addMsg(getReply(t), false); }, 350);
}

function kp(e) { if (e.key === 'Enter') send(); }

window.onload = function() {
  setTimeout(function(){
    addMsg('Assalam o Alaikum!<br><br>Main <strong>Shahid Communication &amp; GAMCA Solution</strong> ka assistant hoon.<br><br>Services, prices ya appointment ke liye neeche buttons dabayein ya sawal likhein.', false);
  }, 300);
};
</script>
</body>
</html>
